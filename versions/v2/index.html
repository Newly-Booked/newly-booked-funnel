<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Newly Booked — See if your area is open</title>
  <meta name="description" content="Answer 6 quick questions to see if your medspa qualifies for Newly Booked. Pre-qualified, pre-financed patients on Cherry-approved budgets. We only get paid when patients pay you." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&display=swap" rel="stylesheet" />

  <!-- Open the script-CDN connection early and start the big libraries
       downloading in parallel with the CSS/fonts (instead of waiting until the
       parser reaches the <body> tags). Same URLs are reused by the scripts. -->
  <link rel="preconnect" href="https://unpkg.com" crossorigin />
  <link rel="preconnect" href="https://fast.wistia.com" />
  <link rel="preload" href="https://unpkg.com/react@18.3.1/umd/react.production.min.js" as="script" crossorigin="anonymous" />
  <link rel="preload" href="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" as="script" crossorigin="anonymous" />
  <link rel="preload" href="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" as="script" crossorigin="anonymous" />

  <script>
    var __v = Date.now();
    document.write('<link rel="stylesheet" href="styles.css?v=' + __v + '">');
    document.write('<link rel="stylesheet" href="funnel.css?v=' + __v + '">');
  </script>

  <script src="https://fast.wistia.com/player.js" async></script>
</head>
<body>
  <div id="root"></div>

  <script src="cities.js"></script>

  <!-- React in PRODUCTION builds (smaller + faster than the dev builds; same
       18.3.1 API). Babel Standalone still compiles the JSX below at load. -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script>
    // Cache-bust JSX on each page load so a fresh deploy is picked up
    // immediately instead of waiting on the GitHub Pages 10-min CDN TTL.
    (function () {
      var v = Date.now();
      ['logo-marquee.jsx','screenshots.jsx','testimonials-faq.jsx','funnel-app.jsx','app.jsx'].forEach(function (s) {
        document.write('<script type="text/babel" src="' + s + '?v=' + v + '"><\/script>');
      });
    })();
  </script>
</body>
</html>
