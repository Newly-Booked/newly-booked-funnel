<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Newly Booked — See if your area is open</title>
  <meta name="description" content="Answer 6 quick questions to see if your medspa qualifies for Newly Booked. Pre-qualified, pre-financed patients on Cherry-approved budgets. We only get paid when patients pay you." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&family=Sora:wght@600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&display=swap" rel="stylesheet" />

  <!-- Paint something branded immediately: dark boot screen shown until React
       mounts and replaces #root. Inline so it needs zero network requests. -->
  <style>
    html{background:#081124}
    .nb-boot{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;background:#081124}
    .nb-boot-mark{font-family:system-ui,-apple-system,sans-serif;font-weight:800;font-size:15px;letter-spacing:5px;color:#fff}
    .nb-boot-mark span{color:#3E8BFF}
    .nb-boot-spin{width:26px;height:26px;border-radius:50%;border:3px solid rgba(255,255,255,.15);border-top-color:#3E8BFF;animation:nbspin .8s linear infinite}
    @keyframes nbspin{to{transform:rotate(360deg)}}
  </style>

  <!-- JSX is precompiled by build.sh into app.v2.min.js — no Babel and no
       in-browser compilation. React is self-hosted from ./vendor (same origin,
       no third-party CDN in the critical path). ?v= is stamped by build.sh. -->
  <link rel="preload" href="vendor/react.production.min.js" as="script" />
  <link rel="preload" href="vendor/react-dom.production.min.js" as="script" />
  <link rel="preload" href="app.v2.min.js?v=NBBUILD202607211458" as="script" />

  <link rel="stylesheet" href="styles.css?v=NBBUILD202607211458" />
  <link rel="stylesheet" href="funnel.css?v=NBBUILD202607211458" />
  <link rel="stylesheet" href="landing.css?v=NBBUILD202607211458" />

  <script src="https://fast.wistia.com/player.js" async></script>
</head>
<body>
  <div id="root">
    <div class="nb-boot">
      <div class="nb-boot-mark">NEWLY&nbsp;<span>BOOKED</span></div>
      <div class="nb-boot-spin"></div>
    </div>
  </div>

  <!-- defer keeps download off the critical path but preserves execution order:
       cities → React → ReactDOM → app bundle (which mounts into #root). -->
  <script src="cities.js?v=NBBUILD202607211458" defer></script>
  <script src="vendor/react.production.min.js" defer></script>
  <script src="vendor/react-dom.production.min.js" defer></script>
  <script src="app.v2.min.js?v=NBBUILD202607211458" defer></script>
</body>
</html>
