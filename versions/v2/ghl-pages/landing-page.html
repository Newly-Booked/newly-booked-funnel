<!--
  NEWLY BOOKED — LANDING PAGE EMBED (for GoHighLevel)  [v2, precompiled]

  HOW TO USE:
  1. In GHL, open the /apply funnel page and its Custom HTML / Code element.
  2. Replace the element's entire contents with EVERYTHING below this comment.
  3. Save + publish. That's it — URLs below are already the real ones.

  WHY THIS VERSION IS FAST:
  - No Babel and no in-browser JSX compiling (was ~2.4MB + seconds of work
    on every visit). JS is precompiled in the repo by versions/v2/build.sh
    into app.v2.min.js (~47KB).
  - React production builds, self-hosted on GitHub Pages (the old embed
    loaded 10x-bigger development builds from unpkg).
  - A branded dark loading screen paints instantly instead of a white page.
  - Files cache properly (the old Date.now() cache-buster re-downloaded
    everything on every visit).

  UPDATES: when the repo is pushed, GitHub Pages serves the new files at the
  same URLs, and this page picks them up within ~10-20 minutes (CDN/browser
  revalidation). For an INSTANT update, re-paste with a bumped ?v= stamp
  (build.sh prints the current stamp).
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Newly Booked — See if your area is open</title>

  <!-- All relative URLs resolve against the v2 folder on GitHub Pages. -->
  <base href="https://newly-booked.github.io/newly-booked-funnel/versions/v2/" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&family=Sora:wght@600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&display=swap" rel="stylesheet" />

  <!-- Instant branded paint while the app loads (no network needed). -->
  <style>
    html{background:#081124}
    .nb-boot{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;background:#081124}
    .nb-boot-mark{font-family:system-ui,-apple-system,sans-serif;font-weight:800;font-size:15px;letter-spacing:5px;color:#fff}
    .nb-boot-mark span{color:#3E8BFF}
    .nb-boot-spin{width:26px;height:26px;border-radius:50%;border:3px solid rgba(255,255,255,.15);border-top-color:#3E8BFF;animation:nbspin .8s linear infinite}
    @keyframes nbspin{to{transform:rotate(360deg)}}
  </style>

  <link rel="preload" href="vendor/react.production.min.js" as="script" />
  <link rel="preload" href="vendor/react-dom.production.min.js" as="script" />
  <link rel="preload" href="app.v2.min.js?v=NBBUILD202607181512" as="script" />

  <link rel="stylesheet" href="styles.css?v=NBBUILD202607181512" />
  <link rel="stylesheet" href="funnel.css?v=NBBUILD202607181512" />
  <link rel="stylesheet" href="landing.css?v=NBBUILD202607181512" />

  <script src="https://fast.wistia.com/player.js" async></script>

  <!-- Qualified leads → the GHL schedule page. Same domain as this apply
       page, so name/email/phone saved in the browser carry over and
       prefill the booking popup. -->
  <script>window.__NB_SCHEDULE_URL = "https://newlybooked.com/schedule-822049";</script>
  <!-- Footer legal links. -->
  <script>
    window.__NB_PRIVACY_URL = "https://newlybooked.com/privacy-policy-872331";
    window.__NB_TERMS_URL   = "https://newlybooked.com/termsconditions";
  </script>
</head>
<body>
  <div id="root">
    <div class="nb-boot">
      <div class="nb-boot-mark">NEWLY&nbsp;<span>BOOKED</span></div>
      <div class="nb-boot-spin"></div>
    </div>
  </div>

  <!-- defer = downloads don't block the page, but run in order:
       cities → React → ReactDOM → app bundle (mounts into #root). -->
  <script src="cities.js?v=NBBUILD202607181512" defer></script>
  <script src="vendor/react.production.min.js" defer></script>
  <script src="vendor/react-dom.production.min.js" defer></script>
  <script src="app.v2.min.js?v=NBBUILD202607181512" defer></script>
</body>
</html>
